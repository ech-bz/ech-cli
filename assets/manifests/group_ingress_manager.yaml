apiVersion: v1
kind: Namespace
metadata:
  name: ingress-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: group-ingress-manager
  namespace: ingress-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: group-ingress-manager
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["serviceaccounts", "secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["apps"]
  resources: ["daemonsets", "deployments"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingressclasses"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  verbs: ["get", "list", "watch", "bind"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterrolebindings", "rolebindings"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["cert-manager.io"]
  resources: ["certificates", "issuers", "clusterissuers"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["traefik.io"]
  resources: ["tlsstores", "ingressroutes", "ingressroutetcps", "ingressrouteudps", "middlewares", "middlewaretcps", "traefikservices", "tlsoptions", "serverstransports", "serverstransporttcps"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["ech.bz"]
  resources: ["ingressgroups"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: group-ingress-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: group-ingress-manager
subjects:
- kind: ServiceAccount
  name: group-ingress-manager
  namespace: ingress-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: group-ingress-manager
  namespace: ingress-system
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: group-ingress-manager
          restartPolicy: Never
          containers:
            - name: sync
              image: alpine/kubectl:1.36.1
              command: ["/bin/sh", "/scripts/sync.sh"]
              env:
                - name: GROUP_INGRESS_TEMPLATE_DIR
                  value: /manifests/group_ingress_manager
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: manifests
                  mountPath: /manifests/group_ingress_manager
          volumes:
            - name: script
              configMap:
                name: group-ingress-script
            - name: manifests
              configMap:
                name: group-ingress-manifests
