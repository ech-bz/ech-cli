name: ecli
help: Cluster management CLI
version: 0.1.2

commands:
- name: install
  help: Install cluster infrastructure into an existing Kubernetes cluster
  flags:
  - long: --gitops-repo
    short: -r
    arg: url
    help: "GitOps repo SSH URL (e.g. git@github.com:org/repo)"
    required: true
  - long: --gitops-path
    arg: path
    help: "Path in gitops repo to sync"
    default: .
  - long: --secret-backend
    arg: backend
    help: "Secret backend: kubernetes or aws"
    allowed: [kubernetes, aws]
    default: kubernetes
  - long: --aws-region
    arg: region
    help: AWS region (required if backend=aws)
  - long: --aws-access-key-id
    arg: id
    help: AWS access key ID (required if backend=aws)
  - long: --aws-secret-access-key
    arg: key
    help: AWS secret access key (required if backend=aws)

- name: bootstrap-network
  help: Generate genesis artifacts and push network secrets to the cluster
  flags:
  - long: --namespace
    short: -n
    arg: namespace
    help: "Target network namespace (for example echbz)"
    required: true
  - long: --validators
    arg: count
    help: "Number of validator replicas"
    required: true
  - long: --epoch-duration-ms
    arg: ms
    help: Genesis epoch duration in milliseconds
    required: true
  - long: --genesis-gas-amount
    arg: amount
    help: Gas amount per sponsor object in genesis
    required: true
  - long: --validator-stake
    arg: amount
    help: Stake amount for each validator in genesis
    required: true
  - long: --sponsor-gas-object-count
    arg: count
    help: Number of gas objects for the relay sponsor
    required: true
  - long: --validator-p2p-port
    arg: port
    help: Validator P2P port used in genesis
    required: true
  - long: --output-dir
    short: -o
    arg: path
    help: "Directory where genesis.blob and seed-peers.yaml will be written"
    default: ./generated

- name: uninstall
  help: Remove cluster infrastructure installed by ecli from the current cluster

- name: join-node
  help: Join a worker node to an existing k3s cluster
  flags:
  - long: --url
    short: -u
    arg: url
    help: "K3s server URL (e.g. https://1.2.3.4:6443)"
    required: true
  - long: --token
    short: -t
    arg: token
    help: K3s node token (from /var/lib/rancher/k3s/server/node-token)
    required: true
  - long: --group
    short: -g
    arg: name
    help: Ingress node group (DNS-1123 label; sets `ech.bz/ingress-group` and node-external-ip)
